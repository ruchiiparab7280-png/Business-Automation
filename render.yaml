services:
  - type: web
    name: whatsapp-bulk-sender
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATA_DIR
        value: ./data
      - key: ADMIN_EMAIL
        value: admin@example.com # Set your permanent login email here
      - key: ADMIN_PASS
        value: admin123 # Set your permanent login password here
    # ℹ️ Render Free Tier deletes files on restart. 
    # Setting the above ADMIN variables creates a 'Master Account' that never disappears!
